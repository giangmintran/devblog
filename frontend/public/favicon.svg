<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Terminal prompt ">" -->
  <polyline points="7,11 13,16 7,21" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore cursor -->
  <line x1="15" y1="21" x2="25" y2="21" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
</svg>
